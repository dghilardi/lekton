# Lekton default configuration.
#
# These values are embedded in the binary and serve as fallbacks.
# Override via:
#   1. config/lekton.toml  (optional local file, git-ignored)
#   2. Environment variables with the LKN__ prefix and __ as separator
#      e.g. LKN__DATABASE__URI, LKN__AUTH__JWT_SECRET

[server]
rate_limit_burst = 50
insecure_cookies = false
log_filter = "lekton=info,tower_http=info"
max_attachment_size_mb = 25

[database]
uri = "mongodb://localhost:27017"
name = "lekton"

[storage]
# Required. Set via LKN__STORAGE__BUCKET or config/lekton.toml.
bucket = ""

[search]
# Leave empty to disable full-text search.
url = ""
api_key = ""

[auth]
demo_mode = false
allow_demo_in_production = false
jwt_access_ttl_secs = 900
jwt_refresh_ttl_days = 30
jwt_issuer = "lekton"
jwt_audience = "lekton"
provider_type = "oidc"
scopes = "openid profile email"

[mcp]
# Allowed Host header values for the MCP Streamable HTTP endpoint (DNS rebinding protection).
# Empty list disables the check (any host is accepted).
allowed_hosts = ["localhost", "127.0.0.1", "::1"]

[rag]
# Leave empty to disable RAG entirely.
qdrant_url = ""
qdrant_collection = "docs_collection"
embedding_url = ""
embedding_model = "nomic-embed-text"
embedding_dimensions = 768
embedding_api_key = ""
chat_url = ""
chat_model = ""
chat_api_key = ""
vertex_project_id = ""
vertex_location = ""
system_prompt_template = """You are a helpful assistant for an internal developer portal. \
Answer the user's question based on the following context extracted from the documentation.

Context:
{{ context }}

If the context does not contain enough information to answer, say so honestly."""
# Leave empty to disable query rewriting (first-turn pass-through only).
rewrite_model = ""
rewrite_max_tokens = 80

# Store original chunk text alongside its embedding in the cache (for debugging).
embedding_cache_store_text = false
# Cache embeddings generated for chat queries (in addition to chunk embeddings).
embedding_cache_query = false
# Combine vector search (Qdrant) with full-text search (Meilisearch) using RRF.
# Requires search.url to be configured. Disabled by default.
hybrid_search_enabled = false

# Extra HTTP headers for chat/rewrite requests. Keys are normalised: _ → - at request time.
# Via env: LKN__RAG__CHAT_HEADERS__X_PRODUCER=LEKTON  →  x-producer: LEKTON
# Via file: use quoted keys to preserve hyphens: "x-producer" = "LEKTON"
[rag.chat_headers]

# Extra HTTP headers for embedding requests. Same normalisation rules apply.
[rag.embedding_headers]
