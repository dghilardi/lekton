# Lekton default configuration.
#
# These values are embedded in the binary and serve as fallbacks.
# Override via:
#   1. config/lekton.toml  (optional local file, git-ignored)
#   2. Environment variables with the LKN__ prefix and __ as separator
#      e.g. LKN__DATABASE__URI, LKN__AUTH__JWT_SECRET

[server]
rate_limit_burst = 50
insecure_cookies = false
log_filter = "lekton=info,tower_http=info"
max_attachment_size_mb = 25

[database]
uri = "mongodb://localhost:27017"
name = "lekton"

[storage]
# Required. Set via LKN__STORAGE__BUCKET or config/lekton.toml.
bucket = ""

[search]
# Leave empty to disable full-text search.
url = ""
api_key = ""

[auth]
demo_mode = false
allow_demo_in_production = false
jwt_access_ttl_secs = 900
jwt_refresh_ttl_days = 30
jwt_issuer = "lekton"
jwt_audience = "lekton"
provider_type = "oidc"
scopes = "openid profile email"

[mcp]
# Allowed Host header values for the MCP Streamable HTTP endpoint (DNS rebinding protection).
# Empty list disables the check (any host is accepted).
allowed_hosts = ["localhost", "127.0.0.1", "::1"]
# Keep MCP sessions across requests. Stateful sessions are in-memory and expire
# after session_keep_alive_secs seconds of inactivity.
stateful_mode = true
# In stateless mode, return application/json directly instead of SSE-framed responses.
json_response = false
# Set to null to disable the inactivity timeout.
session_keep_alive_secs = 300
# Resume cache lifetime for completed request streams in stateful mode.
completed_cache_ttl_secs = 60

[rag]
# Leave both empty to disable RAG entirely.
qdrant_url = ""
qdrant_collection = "docs_collection"
embedding_url = ""
embedding_model = "nomic-embed-text"
embedding_dimensions = 768
embedding_api_key = ""

# Token-aware chunking (cl100k_base tokenizer).
chunk_size_tokens = 256
chunk_overlap_tokens = 64
# Expand top reranked chunks to their full parent section before prompt injection.
expand_to_parent = false

# Store original chunk text alongside its embedding in the cache (for debugging).
embedding_cache_store_text = false
# Cache embeddings generated for chat queries (in addition to chunk embeddings).
embedding_cache_query = false

# Combine vector search (Qdrant) with full-text search (Meilisearch) using RRF.
# Requires search.url to be configured. Disabled by default.
hybrid_search_enabled = false

# Cross-encoder reranker endpoint (Jina/Infinity/Cohere-compatible /rerank API).
# Leave empty to disable reranking.
reranker_url = ""
reranker_model = ""
reranker_api_key = ""

# Extra HTTP headers for embedding requests. Keys normalised: _ → - at request time.
# Via env: LKN__RAG__EMBEDDING_HEADERS__X_PRODUCER=LEKTON  →  x-producer: LEKTON
[rag.embedding_headers]

# Default LLM configuration shared by all RAG pipeline steps.
# Individual steps (rag.chat, rag.analyzer, rag.hyde, rag.rewriter) may override
# any of these fields.
#
# Use Vertex AI: set vertex_project_id (and optionally vertex_location).
# Use OpenAI-compatible: set url and optionally api_key.
#
# Via env: LKN__RAG__LLM__URL, LKN__RAG__LLM__API_KEY, LKN__RAG__LLM__MODEL,
#          LKN__RAG__LLM__VERTEX_PROJECT_ID, LKN__RAG__LLM__VERTEX_LOCATION
#          LKN__RAG__LLM__HEADERS__X_FOO=bar  →  x-foo: bar
[rag.llm]
url = ""
api_key = ""
model = ""
vertex_project_id = ""
vertex_location = ""

[rag.llm.headers]

# Main chat step. Always active when RAG is enabled.
# All LLM fields (url, api_key, model, headers, vertex_*) are optional here
# and fall back to [rag.llm] when absent.
#
# Via env: LKN__RAG__CHAT__MODEL, LKN__RAG__CHAT__URL, …
[rag.chat]
system_prompt_template = """You are a helpful assistant for an internal developer portal. \
Answer the user's question based on the following context extracted from the documentation.

Context:
{{ context }}

If the context does not contain enough information to answer, say so honestly."""

# Optional RAG pipeline steps — comment out or remove the entire section to disable.
#
# [rag.analyzer]       # query complexity classifier + sub-query decomposition
# model = ""           # required to enable this step
# max_tokens = 256
# url = ""             # override rag.llm.url for this step only
# api_key = ""
# vertex_project_id = ""
# vertex_location = ""
#
# [rag.hyde]           # hypothetical document embeddings
# model = ""
# max_tokens = 256
#
# [rag.rewriter]       # multi-turn query rewriter
# model = ""
# max_tokens = 80
