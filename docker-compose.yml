services:
  # ===========================================================================
  # MongoDB — Document metadata & RBAC
  # ===========================================================================
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Garage — S3-compatible object storage
  # ===========================================================================
  garage:
    image: dxflrs/garage:v1.1.0
    ports:
      - "3900:3900" # S3 API
      - "3902:3902" # Admin API
    volumes:
      - garage_data:/var/lib/garage/data
      - garage_meta:/var/lib/garage/meta
      - ./demo/garage.toml:/etc/garage.toml:ro
    environment:
      - GARAGE_CONFIG_FILE=/etc/garage.toml
    healthcheck:
      test: ["CMD", "/garage", "stats"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ===========================================================================
  # Meilisearch — Full-text search engine
  # ===========================================================================
  meilisearch:
    image: getmeili/meilisearch:v1.13.3
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=dev-master-key-change-in-prod
      - MEILI_ENV=development
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ===========================================================================
  # Garage Init — one-shot: configure layout, create bucket, create API key
  # ===========================================================================
  garage-init:
    image: curlimages/curl:latest
    depends_on:
      garage:
        condition: service_healthy
    volumes:
      - ./demo/garage-init.sh:/garage-init.sh:ro
    entrypoint: ["/bin/sh", "/garage-init.sh"]
    restart: "no"

  # ===========================================================================
  # Lekton — Internal Developer Portal
  # ===========================================================================
  lekton:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully
      meilisearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DATABASE=lekton
      - S3_BUCKET=lekton-docs
      - S3_ENDPOINT=http://garage:3900
      - AWS_ACCESS_KEY_ID=lekton-demo-key
      - AWS_SECRET_ACCESS_KEY=lekton-demo-secret
      - AWS_REGION=garage
      - SERVICE_TOKEN=demo-ingest-token
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_API_KEY=dev-master-key-change-in-prod
      - LKN__RAG__QDRANT_URL=http://qdrant:6334
      - LKN__RAG__QDRANT_COLLECTION=lekton
      - DEMO_MODE=true
      - RUST_LOG=lekton=info,tower_http=info
      - LEPTOS_SITE_ADDR=0.0.0.0:3000
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ===========================================================================
  # Qdrant — Vector database for RAG
  # ===========================================================================
  qdrant:
    image: qdrant/qdrant:v1.17
    ports:
      - "6333:6333" # HTTP API
      - "6334:6334" # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ===========================================================================
  # Infinity — Cross-encoder reranker (optional, for RAG reranking)
  #
  # Downloads BAAI/bge-reranker-v2-m3 (~600 MB) on first start.
  # CPU-only is slow but functional for development.
  # Start separately: docker-compose up -d infinity
  # Configure: LKN__RAG__RERANKER_URL=http://localhost:7997/rerank
  # ===========================================================================
  infinity:
    image: michaelf34/infinity:0.0.75
    command:
      - v2
      - --model-name-or-path
      - BAAI/bge-reranker-v2-m3
      - --served-model-name
      - BAAI/bge-reranker-v2-m3
      - --port
      - "7997"
      - --engine
      - torch
    ports:
      - "7997:7997"
    volumes:
      - infinity_models:/app/.cache
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7997/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 120s

  # ===========================================================================
  # Demo Loader — one-shot: ingest demo documents into Lekton
  # ===========================================================================
  demo-loader:
    image: curlimages/curl:latest
    depends_on:
      lekton:
        condition: service_healthy
    volumes:
      - ./demo:/demo:ro
    entrypoint: ["/bin/sh", "/demo/load_demo.sh"]
    restart: "no"

volumes:
  mongo_data:
  garage_data:
  garage_meta:
  meilisearch_data:
  qdrant_data:
  infinity_models:
